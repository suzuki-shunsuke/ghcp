name: acceptance-test

on:
  pull_request:
    paths:
      - .github/workflows/acceptance-test.yaml
      - '**.go'
      - go.*
      - acceptance_test/**
  push:
    branches:
      - master
    paths:
      - .github/workflows/acceptance-test.yaml
      - '**.go'
      - go.*
      - acceptance_test/**

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1
        with:
          bot-id: ${{secrets.TAKUMI_GUARD_BOT_ID}}

      - run: go build -ldflags '-X main.version=${{ github.ref_name }}'
      - run: make -C acceptance_test
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: make -C acceptance_test clean-up
        if: always()
